# Institutional "terminal" palette (Bloomberg/Aladdin direction). Colors read on
# the #0A0E14 canvas. Inflation semantics: up = bad = red, down = good = green.
palette:
  headline: "#E6EAF1"
  alimentacao: "#E8943A"
  transportes: "#4A8FE0"
  habitacao: "#9B7FE0"
  saude: "#35B07D"
  vestuario: "#DD6B5C"
  educacao: "#E6C84A"
  residencia: "#5FB7C4"
  despesas: "#C77FB0"
  comunicacao: "#7E8896"
  diffusion: "#35B07D"
  alta: "#E5484D"
  baixa: "#35B07D"
  neutral: "#8A93A3"
  info: "#4A8FE0"
  medium: "#E0A046"
  high: "#EC7A3D"
  critical: "#E5484D"
plotly_template:
  paper_bgcolor: "#0A0E14"
  plot_bgcolor: "#0A0E14"
  font_family: "IBM Plex Sans, sans-serif"
  gridcolor: "#1A222D"
