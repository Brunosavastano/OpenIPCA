name: refresh-data

on:
  workflow_dispatch:
    inputs:
      force_full:
        description: "Force a full long-history rebuild"
        required: false
        default: false
        type: boolean
  schedule:
    # Best-effort 5-minute detection around the usual release window. Offset from
    # the top of the hour because scheduled Actions are busiest there.
    - cron: "2-57/5 11-22 7-17 * *"
    # Daily backstop for calendar changes outside the usual window.
    - cron: "17 10 * * *"

permissions:
  contents: read

concurrency:
  group: openipca-release-refresh
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.probe.outputs.status }}
      official_month: ${{ steps.probe.outputs.official_month }}
      requires_full_rebuild: ${{ steps.probe.outputs.requires_full_rebuild }}
      source_modified_at: ${{ steps.probe.outputs.source_modified_at }}
      detected_at: ${{ steps.probe.outputs.detected_at }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe official IBGE period without installing dependencies
        id: probe
        run: python scripts/probe_ipca_release.py --json

  refresh:
    needs: probe
    if: needs.probe.outputs.status == 'new' || inputs.force_full == true
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build-time dependencies
        run: python -m pip install -e ".[pipeline]"

      - name: Refresh the detected reference month
        env:
          EXPECTED_MONTH: ${{ needs.probe.outputs.official_month }}
          DETECTED_AT: ${{ needs.probe.outputs.detected_at }}
          SOURCE_MODIFIED_AT: ${{ needs.probe.outputs.source_modified_at }}
          FORCE_FULL_INPUT: ${{ inputs.force_full }}
          PROBE_REQUIRES_FULL: ${{ needs.probe.outputs.requires_full_rebuild }}
        run: |
          extra=()
          if [[ "$FORCE_FULL_INPUT" == "true" || "$PROBE_REQUIRES_FULL" == "true" ]]; then
            extra+=(--force-full)
          fi
          python -m ipca_dashboard.pipeline refresh-latest \
            --expected-month "$EXPECTED_MONTH" \
            --strict \
            --detected-at "$DETECTED_AT" \
            --source-modified-at "$SOURCE_MODIFIED_AT" \
            "${extra[@]}"

      - name: Commit deterministic data only
        id: publish
        env:
          EXPECTED_MONTH: ${{ needs.probe.outputs.official_month }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.parquet outputs/validation_report.csv \
            outputs/diagnostic_latest.json outputs/release_state.json
          if git diff --staged --quiet; then
            echo "No deterministic data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved during the build; refusing to overwrite it. The next probe will retry."
            exit 1
          fi
          git commit -m "chore(data): publish IPCA ${EXPECTED_MONTH} [skip ci]"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch non-blocking report follow-up
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-release-report.yml --ref main

      - name: Dispatch non-blocking AI review follow-up
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run refresh-ai-artifacts.yml --ref main
