name: refresh-data

# Monthly auto-refresh of the IPCA data the app serves. The IBGE releases the
# IPCA once a month (~the 10th), so this runs across that window and commits the
# rebuilt data ONLY when it actually changed. Also exposes a manual "Run workflow"
# button (workflow_dispatch) so it can be triggered and verified on demand.
on:
  workflow_dispatch: {}
  schedule:
    # Twice a day (12:00 and 20:00 UTC = 09:00 and 17:00 BRT) across days 9-16.
    # The IBGE/SIDRA API is flaky from GitHub runners, so the commit-only-when-changed
    # guard makes the extra runs cheap: spreading ~16 attempts over the release window
    # makes it very likely at least one lands the new IPCA. Public repo => Actions are free.
    - cron: "0 12,20 9-16 * *"

# Allow the job to push the refreshed data back to the repository.
permissions:
  contents: write

# Never let two refreshes race on a push to main.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the package
        run: python -m pip install -e .

      - name: Run the pipeline (fetch + build from BCB/SGS and IBGE/SIDRA)
        run: python -m ipca_dashboard.pipeline run --strict

      - name: Commit refreshed data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.parquet outputs/validation_report.csv outputs/diagnostic_latest.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): monthly IPCA refresh [skip ci]"
            git push
            echo "Pushed refreshed IPCA data."
          fi
