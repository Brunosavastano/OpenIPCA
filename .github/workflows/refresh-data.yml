name: refresh-data

# Monthly auto-refresh of the IPCA data the app serves. The IBGE releases the
# IPCA once a month (~the 10th), so this runs across that window and commits the
# rebuilt data ONLY when it actually changed. Also exposes a manual "Run workflow"
# button (workflow_dispatch) so it can be triggered and verified on demand.
on:
  workflow_dispatch: {}
  schedule:
    # Twice a day (12:00 and 20:00 UTC = 09:00 and 17:00 BRT) across days 9-16.
    # The IBGE/SIDRA API is flaky from GitHub runners, so the commit-only-when-changed
    # guard makes the extra runs cheap: spreading ~16 attempts over the release window
    # makes it very likely at least one lands the new IPCA. Public repo => Actions are free.
    - cron: "0 12,20 9-16 * *"

# Allow the job to push the refreshed data back to the repository.
permissions:
  contents: write

# Never let two refreshes race on a push to main.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the package (AI extras for brief/replay regen + pipeline extra for STL)
        run: python -m pip install -e ".[ai,pipeline]"

      # No --start flags on purpose: pipeline defaults fetch SGS from 2012-01
      # (percentile_since_2012 needs the long history; the sgs_history_depth
      # strict check fails closed if it ever shortens) and SIDRA from 2020-01.
      - name: Run the pipeline (fetch + build from BCB/SGS and IBGE/SIDRA)
        run: python -m ipca_dashboard.pipeline run --strict

      - name: Refresh AI artifacts and commit, only if the data changed
        env:
          OPENIPCA_AI_ENABLED: "true"
          OPENIPCA_AI_PROVIDER: "openai"
          # Strong model = same quality as the committed artifacts. Change here if needed.
          OPENIPCA_AI_MODEL: "gpt-5.5"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.parquet outputs/validation_report.csv outputs/diagnostic_latest.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          # Data changed: regenerate the AI brief + replay from the SAME data so the
          # public artifacts never lag the panel. Fail-closed (bash -eo pipefail): if
          # regen errors, the commit below never runs, the data is NOT committed, and
          # the next scheduled run retries — data and AI commit together or not at all.
          python -m ipca_dashboard.ai.cli
          python -m ipca_dashboard.ai.qa_replay
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path("reports/latest/metadata.json").read_text(encoding="utf-8"))
          if metadata.get("mode") != "ai":
              raise SystemExit(
                  f"AI brief did not regenerate in ai mode (mode={metadata.get('mode')!r}); refusing commit."
              )

          replay = json.loads(Path("reports/qa/replay.json").read_text(encoding="utf-8"))
          pairs = replay.get("pairs") if isinstance(replay, dict) else None
          if not isinstance(pairs, list) or not pairs:
              raise SystemExit("AI replay generated zero grounded pairs; refusing commit.")
          PY
          git add reports/latest/ai_brief.md reports/latest/ai_trace.json reports/latest/metadata.json reports/qa/replay.json
          git commit -m "chore(data): monthly IPCA refresh + AI brief/replay [skip ci]"
          git push
          echo "Pushed refreshed IPCA data + AI artifacts."
