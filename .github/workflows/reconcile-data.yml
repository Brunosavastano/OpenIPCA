name: reconcile-data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "27 10 * * 0"

permissions:
  actions: write
  contents: write

concurrency:
  group: openipca-release-refresh
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build-time dependencies
        run: python -m pip install -e ".[pipeline]"

      - name: Rebuild and validate the full official history
        run: python -m ipca_dashboard.pipeline run --strict

      - name: Commit reconciled data only when it changed
        id: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.parquet outputs/validation_report.csv \
            outputs/diagnostic_latest.json outputs/release_state.json
          if git diff --staged --quiet; then
            echo "Full rebuild matches the published data."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved during reconciliation; refusing to overwrite it."
            exit 1
          fi
          git commit -m "chore(data): reconcile official history [skip ci]"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch non-blocking report follow-up
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-release-report.yml --ref main

      - name: Dispatch non-blocking AI review follow-up
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run refresh-ai-artifacts.yml --ref main
