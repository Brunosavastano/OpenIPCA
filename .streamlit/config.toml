# Fixed dark theme so the public demo looks the same for every visitor,
# regardless of their OS/browser preference. Coherent dark palette across the
# app CSS and the Plotly charts (spec_V3 §14.4 — consistent look).
[theme]
base = "dark"
primaryColor = "#E8943A"             # amber institutional accent (action/focus)
backgroundColor = "#0A0E14"          # canvas
secondaryBackgroundColor = "#11161F" # sidebar, tiles, inputs
textColor = "#E6EAF1"
font = "sans serif"                  # IBM Plex Sans applied via CSS @import
