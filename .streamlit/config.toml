# Fixed dark theme so the public demo looks the same for every visitor,
# regardless of their OS/browser preference. Coherent dark palette across the
# app CSS and the Plotly charts (spec_V3 §14.4 — consistent look).
[theme]
base = "dark"
primaryColor = "#4DA3FF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2B"
textColor = "#E6EAF1"
font = "sans serif"
